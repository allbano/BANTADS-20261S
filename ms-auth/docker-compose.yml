services:
  scylladb:
    image: scylladb/scylla:2025.4
    container_name: ms-auth-scylladb
    command: --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' 127.0.0.1 9042"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - scylla-data:/var/lib/scylla

volumes:
  scylla-data:
