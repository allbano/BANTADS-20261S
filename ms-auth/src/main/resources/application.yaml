server:
  port: 8085

spring:
  application:
    name: ms-auth
  mongodb:
    uri: mongodb://localhost:27017/ms_auth

auth:
  jwt:
    issuer: ${JWT_ISSUER:ms-auth}
    secret: ${JWT_SECRET:change-me-in-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
