server:
  port: 8085

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ms-auth
  mongodb:
    uri: mongodb://localhost:27017/ms_auth
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDRESS:albanoaws2024@gmail.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

auth:
  jwt:
    issuer: ${JWT_ISSUER:ms-auth}
    secret: ${JWT_SECRET:change-me-in-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
