name: bantads

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-java-service: &java-service
  restart: unless-stopped
  networks:
    - bantads-network
  logging: *common-logging

# ══════════════════════════════════════════════════════════════════════
# INFRAESTRUTURA
# ══════════════════════════════════════════════════════════════════════
services:
  bantads-pg-account:
    image: postgres:18.3-alpine3.23
    container_name: bantads-pg-account
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bantads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      POSTGRES_DB: ${POSTGRES_DB_ACCOUNT:-bantads_account}
    ports:
      - "55000:5432"
    volumes:
      - bantads-pg-account:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bantads-network
    logging: *common-logging

  bantads-pg-account-r:
    image: postgres:18.3-alpine3.23
    container_name: bantads-pg-account-r
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bantads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      POSTGRES_DB: ${POSTGRES_DB_ACCOUNT_R:-bantads_account_r}
    ports:
      - "55004:5432"
    volumes:
      - bantads-pg-account-r:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bantads-network
    logging: *common-logging

  bantads-pg-cliente:
    image: postgres:18.3-alpine3.23
    container_name: bantads-pg-cliente
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bantads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      POSTGRES_DB: ${POSTGRES_DB_CLIENTE:-bantads_cliente}
    ports:
      - "55001:5432"
    volumes:
      - bantads-pg-cliente:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bantads-network
    logging: *common-logging

  bantads-pg-funcionario:
    image: postgres:18.3-alpine3.23
    container_name: bantads-pg-funcionario
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bantads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      POSTGRES_DB: ${POSTGRES_DB_FUNCIONARIO:-bantads_funcionario}
    ports:
      - "55002:5432"
    volumes:
      - bantads-pg-funcionario:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bantads-network
    logging: *common-logging

  bantads-mongodb:
    image: mongo:8.2
    container_name: bantads-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-bantads}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-bantads123}
    command: ["mongod", "--port", "27017", "--auth", "--bind_ip_all"]
    ports:
      - "55003:27017"
    volumes:
      - bantads-mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - bantads-network
    logging: *common-logging

  bantads-rabbitmq:
    image: rabbitmq:4.3-management
    container_name: bantads-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - bantads-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bantads-network
    logging: *common-logging

# ══════════════════════════════════════════════════════════════════════
# MICROSSERVIÇOS JAVA
# ══════════════════════════════════════════════════════════════════════
  bantads-ms-auth:
    <<: *java-service
    container_name: bantads-ms-auth
    build:
      context: ms-auth/
      dockerfile: Dockerfile
    ports:
      - "40009:40009"
    environment:
      SERVER_PORT: 40009
      # Spring Boot 4.0 movimentou as props de conexao do Mongo para o prefixo `spring.mongodb.*`
      # (modulo spring-boot-mongodb). O antigo `spring.data.mongodb.uri` e ignorado, por isso
      # a variavel correta e SPRING_MONGODB_URI -> spring.mongodb.uri.
      SPRING_MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-bantads}:${MONGO_INITDB_ROOT_PASSWORD:-bantads123}@bantads-mongodb:27017/ms_auth?authSource=admin
      JWT_ISSUER: ${JWT_ISSUER:-ms-auth}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      MAIL_ADDRESS: ${MAIL_ADDRESS:-albanoaws2024@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-change-me}
      SPRING_RABBITMQ_HOST: bantads-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      bantads-mongodb:
        condition: service_healthy
      bantads-rabbitmq:
        condition: service_healthy

  bantads-ms-cliente:
    <<: *java-service
    container_name: bantads-ms-cliente
    build:
      context: ms-cliente/
      dockerfile: Dockerfile
    ports:
      - "40007:40007"
    environment:
      SERVER_PORT: 40007
      SPRING_DATASOURCE_URL: jdbc:postgresql://bantads-pg-cliente:5432/${POSTGRES_DB_CLIENTE:-bantads_cliente}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bantads}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      MS_CONTA_URL: http://bantads-ms-conta:40006
      SPRING_RABBITMQ_HOST: bantads-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      bantads-pg-cliente:
        condition: service_healthy
      bantads-rabbitmq:
        condition: service_healthy

  bantads-ms-conta:
    <<: *java-service
    container_name: bantads-ms-conta
    build:
      context: ms-conta/
      dockerfile: Dockerfile
    ports:
      - "40006:40006"
    environment:
      SERVER_PORT: 40006
      # CQRS: datasource de Comando (conta_cud) e de Consulta (conta_r)
      SPRING_DATASOURCE_URL: jdbc:postgresql://bantads-pg-account:5432/${POSTGRES_DB_ACCOUNT:-bantads_account}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bantads}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      READ_DATASOURCE_URL: jdbc:postgresql://bantads-pg-account-r:5432/${POSTGRES_DB_ACCOUNT_R:-bantads_account_r}
      READ_DATASOURCE_USERNAME: ${POSTGRES_USER:-bantads}
      READ_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_RABBITMQ_HOST: bantads-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      bantads-pg-account:
        condition: service_healthy
      bantads-pg-account-r:
        condition: service_healthy
      bantads-rabbitmq:
        condition: service_healthy

  bantads-ms-funcionario:
    <<: *java-service
    container_name: bantads-ms-funcionario
    build:
      context: ms-funcionario/
      dockerfile: Dockerfile
    ports:
      - "40008:40008"
    environment:
      SERVER_PORT: 40008
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://bantads-pg-funcionario:5432/${POSTGRES_DB_FUNCIONARIO:-bantads_funcionario}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bantads}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bantads123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_RABBITMQ_HOST: bantads-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      bantads-pg-funcionario:
        condition: service_healthy
      bantads-rabbitmq:
        condition: service_healthy

  bantads-ms-saga:
    <<: *java-service
    container_name: bantads-ms-saga
    build:
      context: ms-saga/
      dockerfile: Dockerfile
    ports:
      - "40010:40010"
    environment:
      SERVER_PORT: 40010
      SPRING_RABBITMQ_HOST: bantads-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
    depends_on:
      bantads-rabbitmq:
        condition: service_healthy

  bantads-ms-notificacao:
    <<: *java-service
    container_name: bantads-ms-notificacao
    build:
      context: ms_notificacao/
      dockerfile: Dockerfile
    ports:
      - "40011:40011"
    environment:
      SERVER_PORT: 40011
      SPRING_RABBITMQ_HOST: bantads-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      MAIL_ADDRESS: ${MAIL_ADDRESS:-albanoaws2024@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-change-me}
    depends_on:
      bantads-rabbitmq:
        condition: service_healthy

# ══════════════════════════════════════════════════════════════════════
# API GATEWAY (Node.js / TypeScript)
# ══════════════════════════════════════════════════════════════════════
  bantads-api-gateway:
    container_name: bantads-api-gateway
    build:
      context: api-gateway/
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "40004:40004"
    environment:
      PORT: 40004
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MS_AUTH_URL: http://bantads-ms-auth:40009
      MS_CLIENTE_URL: http://bantads-ms-cliente:40007
      MS_CONTA_URL: http://bantads-ms-conta:40006
      MS_FUNCIONARIO_URL: http://bantads-ms-funcionario:40008
      MS_SAGA_URL: http://bantads-ms-saga:40010
    depends_on:
      bantads-ms-auth:
        condition: service_started
      bantads-ms-cliente:
        condition: service_started
      bantads-ms-conta:
        condition: service_started
      bantads-ms-funcionario:
        condition: service_started
      bantads-ms-saga:
        condition: service_started
    networks:
      - bantads-network
    logging: *common-logging

# ══════════════════════════════════════════════════════════════════════
# FRONTEND (Angular / nginx)
# ══════════════════════════════════════════════════════════════════════
  bantads-ui:
    container_name: bantads-ui
    build:
      context: bantads-ui/
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - bantads-api-gateway
    networks:
      - bantads-network
    logging: *common-logging

volumes:
  bantads-pg-account:
  bantads-pg-account-r:
  bantads-pg-cliente:
  bantads-pg-funcionario:
  bantads-mongodb:
  bantads-rabbitmq:

networks:
  bantads-network:
    name: bantads-network
    driver: bridge
