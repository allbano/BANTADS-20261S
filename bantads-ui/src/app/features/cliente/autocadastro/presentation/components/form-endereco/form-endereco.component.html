    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex flex-col gap-5 text-[#ccc] font-sans"
    >
      <div class="text-center mb-6">
        <h2
          class="text-2xl font-medium text-white mb-2"
          style="font-family: 'Comic Sans MS', cursive, sans-serif;"
        >
          Abra sua conta
        </h2>
        <p class="text-sm text-[#888]">Informe seu endereço</p>
      </div>

      <!-- CEP -->
      <div class="flex flex-col gap-1 w-full lg:w-3/4 pr-2">
        <label class="text-xs text-[#888] ml-1">CEP</label>
        <div class="flex gap-2">
          <input
            type="text"
            formControlName="cep"
            placeholder="00000-000"
            class="w-full flex-[2] bg-[#18181A] border border-[#333] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#6dbf73] transition-colors"
          />
          <button
            type="button"
            (click)="buscarCep()"
            [disabled]="buscandoCep() || !form.get('cep')?.value"
            class="flex-1 bg-[#2A2A2A] hover:bg-[#333] border border-[#444] text-white px-4 py-2 rounded-xl text-sm transition-colors whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Buscar CEP
          </button>
        </div>
        @if (buscandoCep()) {
          <div class="text-xs text-[#6dbf73] ml-1">Buscando endereço...</div>
        }
        @if (cepInvalido()) {
          <div class="text-xs text-red-500 ml-1">CEP não encontrado.</div>
        }
      </div>

      <!-- Logradouro e Número -->
      <div class="flex gap-4">
        <div class="flex flex-col gap-1 flex-[3]">
          <label class="text-xs text-[#888] ml-1">Logradouro</label>
          <input
            type="text"
            formControlName="logradouro"
            class="w-full bg-transparent bg-[#111112] border border-[#333] rounded-xl px-4 py-3 text-sm text-[#888] focus:outline-none cursor-not-allowed"
          />
        </div>
        <div class="flex flex-col gap-1 flex-1">
          <label class="text-xs text-[#888] ml-1">Número</label>
          <input
            type="text"
            formControlName="numero"
            class="w-full bg-[#18181A] border border-[#333] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#6dbf73] transition-colors"
          />
        </div>
      </div>

      <!-- Complemento -->
      <div class="flex flex-col gap-1">
        <label class="text-xs text-[#888] ml-1">Complemento</label>
        <input
          type="text"
          formControlName="complemento"
          class="w-full bg-[#18181A] border border-[#333] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#6dbf73] transition-colors"
        />
      </div>

      <!-- Cidade e UF -->
      <div class="flex gap-4">
        <div class="flex flex-col gap-1 flex-[4]">
          <label class="text-xs text-[#888] ml-1">Cidade</label>
          <input
            type="text"
            formControlName="cidade"
            class="w-full bg-transparent bg-[#111112] border border-[#333] rounded-xl px-4 py-3 text-sm text-[#888] focus:outline-none cursor-not-allowed"
          />
        </div>
        <div class="flex flex-col gap-1 flex-1">
          <label class="text-xs text-[#888] ml-1">UF</label>
          <input
            type="text"
            formControlName="uf"
            placeholder="PR"
            class="w-full bg-transparent bg-[#111112] border border-[#333] rounded-xl px-4 py-3 text-sm text-[#888] focus:outline-none uppercase cursor-not-allowed"
            maxlength="2"
          />
        </div>
      </div>

      <!-- Botões -->
      <div class="flex gap-4 mt-6">
        <button
          type="button"
          (click)="onVoltar()"
          class="flex-1 bg-transparent border border-[#666] hover:bg-[#222] text-white font-medium py-3 rounded-xl transition-colors"
        >
          Voltar
        </button>
        <button
          type="submit"
          [disabled]="form.invalid || buscandoCep()"
          class="flex-[1.5] bg-[#6dbf73] hover:bg-[#5da262] text-black font-medium py-3 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Continuar
        </button>
      </div>
    </form>
