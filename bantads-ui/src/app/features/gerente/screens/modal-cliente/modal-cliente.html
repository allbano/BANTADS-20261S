<!-- Overlay de fundo escuro -->
<div class="fixed inset-0 bg-[#000000cc] z-50 flex items-center justify-center p-4">
    <!-- Container do Modal -->
    <div class="bg-[#18181A] border border-[#333] rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden flex flex-col">
        
        <!-- Cabeçalho -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-[#2A2A2A]">
            <h4 class="text-xl font-medium text-white">{{ cliente?.nome || 'Detalhes do Cliente' }}</h4>
            <button type="button" class="text-[#888] hover:text-white transition-colors" aria-label="Close" (click)="closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div> 

        <!-- Corpo do Modal -->
        @if(cliente) {
            <div class="p-6 text-[#ccc] space-y-3 font-light">
                <div class="grid grid-cols-3 gap-2">
                    <span class="text-[#888]">Nome:</span>
                    <span class="col-span-2 text-white">{{ cliente.nome }}</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <span class="text-[#888]">CPF:</span>
                    <span class="col-span-2 text-white">{{ cliente.cpf }}</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <span class="text-[#888]">Salário:</span>
                    <span class="col-span-2 text-[#6dbf73] font-medium">{{ cliente.salario | currency:'BRL':'symbol' }}</span>
                </div>
            </div>
        }

        <!-- Rodapé do Modal -->
        <div class="flex gap-4 px-6 py-4 bg-[#111112] border-t border-[#2A2A2A]">
            <button type="button" class="flex-1 bg-[#2A2A2A] hover:bg-[#333] border border-[#444] text-white px-4 py-2 rounded-xl transition-colors" (click)="closeModal()">
                Fechar
            </button>
            <button type="button" class="flex-1 bg-[#6dbf73] hover:bg-[#5da262] text-black font-medium px-4 py-2 rounded-xl transition-colors" (click)="aprovarCliente()">
                Aprovar
            </button>
        </div>
    </div>
</div>
