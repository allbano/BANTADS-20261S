<section>
    <main>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Salário</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                @for (cliente of clientes; track cliente.id) {
                <tr>
                    <td>{{cliente.nome}}</td>
                    <td>{{cliente.cpf}}</td>
                    <td>{{cliente.salario}}</td>
                    <td>
                        <div class="flex">
                        <button type="button" class="btn btn-warning"  (click)="openModal(cliente)">Visualizar</button>
                        </div>
                    </td>
                </tr>}
                @empty {
                    <tr>
                        <td colspan="5">NENHUMA PESSOA CADASTRADA.</td>
                    </tr>
                }
            </tbody>
        </table>
    
    </main>
</section>
