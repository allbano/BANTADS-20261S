<section>
    <main>
        <table class="table">
          <tbody>
            @for (cliente of clientes; track cliente.id) {
            <tr>
                <td>{{cliente.nome}}</td>
                <td>{{cliente.cpf}}</td>
                <td>{{cliente.salario}}</td>
                <td>
                    <div class="flex">
                       <!-- <button type="button" class="btn btn-success"  (click)="abrirModalPessoa(cliente)">Aprovar</button>
                        
                        <button type="button" class="btn btn-danger" (click)="abrirModalPessoa(cliente)">Recusar</button>-->
                    </div>
                </td>
            </tr>}
            @empty {
                <tr>
                    <td colspan="5">NENHUMA PESSOA CADASTRADA.</td>
                </tr>
            }
            </tbody>
        </table>
    
    </main>
</section>
