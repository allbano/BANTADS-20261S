# ══════════════════════════════════════════════════════════════
# ms-funcionario — Profile: PRODUCTION
# TODAS as credenciais DEVEM vir de variáveis de ambiente.
# A aplicação FALHA na inicialização se alguma estiver ausente.
# ══════════════════════════════════════════════════════════════

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/bantads
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}
    connection-timeout: 10000
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-retries: 5
          max-interval: 10000
          multiplier: 2.0

# ── Logging restrito ────────────────────────────────────────
logging:
  level:
    root: WARN
    br.dac.bantads: INFO
    org.hibernate.SQL: WARN
