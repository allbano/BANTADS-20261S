# ══════════════════════════════════════════════════════════════
# ms-funcionario — Configuração Base
# Profile ativo controlado por variável de ambiente.
# Fallback para 'dev' apenas em ambiente local sem Docker.
# ══════════════════════════════════════════════════════════════

server:
  port: 40008
  shutdown: graceful

spring:
  application:
    name: ms-funcionario

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false   # apos esgotar retries, dead-letter para bantads.dlx
        retry:
          enabled: true
          initial-interval: 2000ms
          max-retries: 3
          multiplier: 2.0
          max-interval: 16000ms

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

# ── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    root: INFO
    br.dac.bantads: INFO
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"